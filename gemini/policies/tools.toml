commandPrefix = "ls"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "poetry run flake8"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "poetry run pyright"
decision = "allow"
