# Other allowed tools
[[rule]]
toolName = "list_directory"
decision = "allow"
priority = 100

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

# Explicitly denied shell commands
[[rule]]
toolName = "run_shell_command"
commandPrefix = "git commit"
decision = "deny"
priority = 100
deny_message = "Git commit is restricted by project policy. Please use git commands directly if needed."

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git push"
decision = "deny"
priority = 100
deny_message = "Git push is restricted by project policy. Please use git commands directly if needed."
